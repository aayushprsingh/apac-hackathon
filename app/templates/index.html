<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex — Personal Productivity Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e5e7eb; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #2d2d3a; margin-bottom: 30px; }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #6b7280; margin-top: 8px; }
        .chat-container { background: #1a1b23; border-radius: 16px; border: 1px solid #2d2d3a; overflow: hidden; }
        .messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 14px 18px; border-radius: 16px; line-height: 1.6; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .message.cortex { align-self: flex-start; background: #252633; border: 1px solid #2d2d3a; border-bottom-left-radius: 4px; }
        .input-area { display: flex; padding: 16px; border-top: 1px solid #2d2d3a; gap: 12px; }
        input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid #2d2d3a; background: #0f1117; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #4f46e5; }
        button { padding: 14px 24px; border-radius: 12px; border: none; background: #4f46e5; color: white; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .typing { color: #6b7280; font-style: italic; padding: 10px; }
        nav { display: flex; justify-content: center; gap: 20px; padding: 16px 0; margin-bottom: 20px; }
        nav a { color: #6b7280; text-decoration: none; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
        nav a:hover { color: #e5e7eb; background: #252633; }
        nav a.active { color: #667eea; background: #252633; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Cortex</h1>
            <p class="subtitle">Your persistent productivity chief of staff</p>
        </header>
        <nav>
            <a href="/" class="active">💬 Chat</a>
            <a href="/memory">🧠 Memory</a>
            <a href="/tasks">📋 Tasks</a>
        </nav>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message cortex">Good morning! I'm Cortex — your persistent productivity assistant. I remember your work across sessions, check your calendar, and help you stay on top of tasks and emails. What can I help you with today?</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Ask me anything... e.g. 'What''s on my plate today?'" onkeydown="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script>
        let sessionId = localStorage.getItem('cortex_session') || crypto.randomUUID();
        localStorage.setItem('cortex_session', sessionId);
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const msg = input.value.trim();
            if (!msg) return;
            
            // Add user message
            addMessage(msg, 'user');
            input.value = '';
            btn.disabled = true;
            
            // Add typing indicator
            const typing = document.createElement('div');
            typing.className = 'message cortex typing';
            typing.textContent = 'Cortex is thinking...';
            document.getElementById('messages').appendChild(typing);
            scrollToBottom();
            
            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: sessionId })
                });
                const data = await res.json();
                typing.remove();
                
                if (data.response) {
                    addMessage(data.response, 'cortex');
                } else if (data.error) {
                    addMessage('Error: ' + data.error, 'cortex');
                }
            } catch (e) {
                typing.remove();
                addMessage('Connection error. Is the server running?', 'cortex');
            }
            
            btn.disabled = false;
            input.focus();
        }
        
        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }
        
        function scrollToBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
