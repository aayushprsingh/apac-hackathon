<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory — Cortex</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e5e7eb; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #2d2d3a; margin-bottom: 30px; }
        h1 { font-size: 2rem; color: #667eea; }
        .subtitle { color: #6b7280; margin-top: 8px; }
        nav { display: flex; justify-content: center; gap: 20px; padding: 16px 0; margin-bottom: 20px; }
        nav a { color: #6b7280; text-decoration: none; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
        nav a:hover { color: #e5e7eb; background: #252633; }
        nav a.active { color: #667eea; background: #252633; }
        .memory-card { background: #1a1b23; border: 1px solid #2d2d3a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .memory-key { font-weight: 700; color: #667eea; font-size: 1.1rem; margin-bottom: 8px; }
        .memory-value { color: #d1d5db; line-height: 1.6; white-space: pre-wrap; }
        .memory-meta { margin-top: 10px; font-size: 0.85rem; color: #6b7280; }
        .confidence { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #252633; margin-right: 8px; }
        .source { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #1f2937; }
        .empty { text-align: center; color: #6b7280; padding: 40px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-chat { background: #4f46e5; color: white; }
        .badge-email { background: #059669; color: white; }
        .badge-explicit { background: #d97706; color: white; }
        .badge-calendar { background: #7c3aed; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Memory</h1>
            <p class="subtitle">Cortex's persistent memory model — what it knows about you</p>
        </header>
        <nav>
            <a href="/">💬 Chat</a>
            <a href="/memory" class="active">🧠 Memory</a>
            <a href="/tasks">📋 Tasks</a>
        </nav>
        <div id="memoryList">
            <p class="empty">Loading memory...</p>
        </div>
    </div>
    <script>
        async function loadMemory() {
            try {
                const res = await fetch('/api/memory');
                const data = await res.json();
                const list = document.getElementById('memoryList');
                
                if (!data.memory || data.memory.length === 0) {
                    list.innerHTML = '<p class="empty">No memory entries yet. Start chatting with Cortex!</p>';
                    return;
                }
                
                list.innerHTML = data.memory.map(m => `
                    <div class="memory-card">
                        <div class="memory-key">${m.key}</div>
                        <div class="memory-value">${JSON.stringify(m.value, null, 2)}</div>
                        <div class="memory-meta">
                            <span class="confidence">${Math.round(m.confidence * 100)}% confidence</span>
                            <span class="badge badge-${m.source}">${m.source}</span>
                            <span style="margin-left: 8px;">Updated: ${new Date(m.updated_at).toLocaleString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('memoryList').innerHTML = '<p class="empty">Error loading memory.</p>';
            }
        }
        loadMemory();
    </script>
</body>
</html>
